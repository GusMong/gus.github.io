<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Para você</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: #000;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: #fff;
    text-align: center;
    overflow: hidden;
}

/* card */
.card {
    background: rgba(255,255,255,0.05);
    padding: 40px;
    border-radius: 20px;
    max-width: 500px;
    transition: 0.5s;
    z-index: 2;
}

button {
    margin-top: 20px;
    padding: 10px 20px;
    border: 1px solid #fff;
    background: transparent;
    color: #fff;
    border-radius: 10px;
    cursor: pointer;
}

/* luzinhas piscando */
.star {
    position: absolute;
    width: 3px;
    height: 3px;
    background: white;
    border-radius: 50%;
    animation: piscar 2s infinite alternate;
}

@keyframes piscar {
    from { opacity: 0.2; }
    to { opacity: 1; transform: scale(1.5); }
}

/* rastro do mouse/toque */
.trail {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    pointer-events: none;
    animation: fade 1s linear forwards;
}

@keyframes fade {
    to {
        opacity: 0;
        transform: scale(2);
    }
}
</style>
</head>

<body>

<div class="card" id="card">
    <div id="conteudo">
        <h1>Oi amiguinha</h1>

        <p>
            fiz esse mini site pra vc,
            eu sei q ta difícil ai, sinto muito
        </p>

        <p>
            mas espero q essa homenagemzinha
            te alegre nem q seja um pouquinho
        </p>

        <p>
            gosto muito de vccc
        </p>

        <button onclick="trocar()">clique aqui</button>
    </div>
</div>

<script>
function trocar() {
    const card = document.getElementById("card");

    card.style.opacity = "0";

    setTimeout(() => {
        document.getElementById("conteudo").innerHTML = `
            <h1>Eu fico feliz por ter te conhecido.</h1>
        `;

        card.style.opacity = "1";

        criarEstrelas();
    }, 500);
}

/* cria luzinhas */
function criarEstrelas() {
    for (let i = 0; i < 120; i++) {
        const s = document.createElement("div");
        s.classList.add("star");

        s.style.left = Math.random() * window.innerWidth + "px";
        s.style.top = Math.random() * window.innerHeight + "px";

        document.body.appendChild(s);
    }
}

/* rastro colorido */
document.addEventListener("mousemove", criarRastro);
document.addEventListener("touchmove", (e) => {
    const touch = e.touches[0];
    criarRastro({clientX: touch.clientX, clientY: touch.clientY});
});

function criarRastro(e) {
    const t = document.createElement("div");
    t.classList.add("trail");

    const cores = ["#66a6ff", "#89f7fe", "#a18cd1", "#fbc2eb"];

    t.style.background = cores[Math.floor(Math.random() * cores.length)];
    t.style.left = e.clientX + "px";
    t.style.top = e.clientY + "px";

    document.body.appendChild(t);

    setTimeout(() => {
        t.remove();
    }, 1000);
}
</script>

</body>
</html>
